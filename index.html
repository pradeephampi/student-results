function getGrade(p){
  if(p>=90) return "A+";
  else if(p>=75) return "A";
  else if(p>=60) return "B";
  else if(p>=50) return "C";
  else return "D";
}

function getResult(){
  let roll=document.getElementById("roll").value.trim();

  if(students[roll]){
    let s=students[roll];
    let total=s.k+s.e+s.h+s.m+s.s+s.ss;
    let percentage=(total/78)*100;
    let result=(percentage>=35)?"PASS":"FAIL";
    let cls=(percentage>=35)?"pass":"fail";

    document.getElementById("result").innerHTML=`
    <div class="card">
      <div class="top-header">
        <p><b>Name:</b> ${s.name}</p>
        <p><b>Reg No:</b> ${roll}</p>
        <p><b>Class:</b> ${s.class}</p>
      </div>

      <div class="section">Part A - Subject Marks</div>

      <table>
        <tr><th>Subject</th><th>Marks</th></tr>
        <tr><td>Kannada</td><td>${s.k}</td></tr>
        <tr><td>English</td><td>${s.e}</td></tr>
        <tr><td>Hindi</td><td>${s.h}</td></tr>
        <tr><td>Maths</td><td>${s.m}</td></tr>
        <tr><td>Science</td><td>${s.s}</td></tr>
        <tr><td>Social</td><td>${s.ss}</td></tr>
      </table>

      <div class="section">Result Summary</div>

      <div class="result-box">
        <b>Total:</b> ${total}/78 <br>
        <b>Percentage:</b> ${percentage.toFixed(2)}% <br>
        <b>Grade:</b> ${getGrade(percentage)} <br>
        <b>Result:</b> <span class="${cls}">${result}</span>
      </div>
    </div>`;
  } else {

  }
}
