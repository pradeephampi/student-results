function getGrade(p){
  if(p>=90) return "A+";
  else if(p>=75) return "A";
  else if(p>=60) return "B";
  else if(p>=50) return "C";
  else return "D";
}

function getResult(){
  let roll=document.getElementById("roll").value.trim();

  if(students[roll]){
    let s=students[roll];
    let total=s.k+s.e+s.h+s.m+s.s+s.ss;
    let percentage=(total/78)*100;

    let result=(percentage>=35)?"PASS":"FAIL";
    let cls=(percentage>=35)?"pass":"fail";

    document.getElementById("result").innerHTML=`
    <div id="card">
    <h3>Marks Card</h3>
    <b>Name:</b> ${s.name}<br>
    <b>Enrollment No:</b> ${roll}<br>
    <b>Class:</b> ${s.class}<br><br>

    Kannada: ${s.k}<br>
    English: ${s.e}<br>
    Hindi: ${s.h}<br>
    Maths: ${s.m}<br>
    Science: ${s.s}<br>
    Social: ${s.ss}<br><br>

    <b>Total:</b> ${total}/78<br>
    <b>Percentage:</b> ${percentage.toFixed(2)}%<br>
    <b>Grade:</b> ${getGrade(percentage)}<br>
    <b>Result:</b> <span class="${cls}">${result}</span>
    </div>`;
  } else {
    document.getElementById("result").innerHTML="<b>No result found!</b>";
  }
}
